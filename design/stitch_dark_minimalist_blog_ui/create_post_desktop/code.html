<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style id="tailwind-config">
        /* Tailwind configuration as provided in the instructions */
    </style>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#2f2ebe",
                        "surface-bright": "#393939",
                        "inverse-surface": "#e5e2e1",
                        "inverse-primary": "#494bd6",
                        "secondary-fixed": "#d4e4fa",
                        "surface-container-low": "#1c1b1b",
                        "primary-fixed": "#e1e0ff",
                        "on-tertiary-container": "#452000",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-surface": "#e5e2e1",
                        "error": "#ffb4ab",
                        "surface-dim": "#131313",
                        "on-primary-container": "#0d0096",
                        "error-container": "#93000a",
                        "on-secondary-container": "#a7b6cc",
                        "on-surface-variant": "#c7c4d7",
                        "surface-container-highest": "#353534",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-error-container": "#ffdad6",
                        "on-background": "#e5e2e1",
                        "on-tertiary-fixed": "#301400",
                        "outline": "#908fa0",
                        "secondary-container": "#39485a",
                        "on-primary-fixed": "#07006c",
                        "on-secondary-fixed": "#0d1c2d",
                        "surface-tint": "#c0c1ff",
                        "tertiary-fixed": "#ffdcc5",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary": "#ffb783",
                        "surface-variant": "#353534",
                        "secondary": "#b9c8de",
                        "on-secondary": "#233143",
                        "surface-container": "#201f1f",
                        "surface-container-high": "#2a2a2a",
                        "secondary-fixed-dim": "#b9c8de",
                        "background": "#131313",
                        "on-secondary-fixed-variant": "#39485a",
                        "primary-container": "#8083ff",
                        "primary": "#c0c1ff",
                        "inverse-on-surface": "#313030",
                        "on-primary": "#1000a9",
                        "outline-variant": "#464554",
                        "surface": "#131313",
                        "tertiary-container": "#d97721",
                        "on-tertiary": "#4f2500"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "unit": "4px",
                        "stack-lg": "48px",
                        "content-width": "720px",
                        "stack-xl": "80px",
                        "margin-mobile": "16px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "container-max": "1120px"
                    },
                    "fontFamily": {
                        "display": ["Inter"],
                        "label-md": ["Inter"],
                        "h1": ["Inter"],
                        "body-lg": ["Inter"],
                        "h2": ["Inter"],
                        "caption": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.75", "fontWeight": "400"}],
                        "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "caption": ["12px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-[#121212] dark:bg-[#121212] font-['Inter'] tracking-tight text-sm font-medium docked full-width top-0 border-b border-[#262626] flat no-shadows">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-[1120px] mx-auto">
<div class="text-xl font-bold tracking-tighter text-neutral-100">Quietude</div>
<nav class="hidden md:flex items-center space-x-8">
<a class="text-neutral-400 hover:text-neutral-100 transition-colors duration-200" href="#">Explore</a>
<a class="text-neutral-400 hover:text-neutral-100 transition-colors duration-200" href="#">Library</a>
<a class="text-indigo-400 border-b-2 border-indigo-500 pb-1 hover:text-neutral-100 transition-colors duration-200" href="#">Writing</a>
</nav>
<div class="flex items-center space-x-4">
<button class="bg-primary text-on-primary px-4 py-2 rounded-lg font-label-md hover:bg-primary-container transition-all active:scale-95">
                    New Post
                </button>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-on-surface transition-colors" data-icon="account_circle">account_circle</span>
</div>
</div>
</header>
<!-- Progress Indicator (Minimalist) -->
<div class="fixed top-0 left-0 w-1/3 h-[2px] bg-indigo-500 z-[60]"></div>
<!-- Main Canvas -->
<main class="max-w-[720px] mx-auto px-margin-mobile md:px-0 mt-stack-xl mb-stack-xl">
<!-- Contextual Back Action -->
<div class="flex items-center gap-2 mb-stack-md text-neutral-500 hover:text-neutral-300 transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
<span class="font-label-md">Back to Drafts</span>
</div>
<!-- Editor Section -->
<section class="space-y-stack-md">
<!-- Title Input -->
<div class="relative group">
<input autocomplete="off" class="w-full bg-transparent border-none focus:ring-0 font-display text-display text-on-surface placeholder:text-surface-variant px-0 transition-all" placeholder="Post Title" type="text"/>
<div class="absolute bottom-0 left-0 w-0 h-[1px] bg-primary transition-all duration-500 group-focus-within:w-full"></div>
</div>
<!-- Metadata / Tools Strip -->
<div class="flex items-center gap-4 py-4 border-y border-[#262626]">
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container rounded-full border border-[#262626]">
<span class="material-symbols-outlined text-[18px] text-neutral-400" data-icon="schedule">schedule</span>
<span class="font-caption text-neutral-400">5 min read</span>
</div>
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container rounded-full border border-[#262626]">
<span class="material-symbols-outlined text-[18px] text-neutral-400" data-icon="tag">tag</span>
<span class="font-caption text-neutral-400">Add Tags</span>
</div>
<div class="ml-auto flex items-center gap-4">
<button class="text-neutral-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="image">image</span>
</button>
<button class="text-neutral-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="format_list_bulleted">format_list_bulleted</span>
</button>
<button class="text-neutral-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="code">code</span>
</button>
</div>
</div>
<!-- Content Area -->
<div class="relative min-h-[500px]">
<textarea class="w-full h-full min-h-[500px] bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-surface-variant placeholder:text-surface-variant px-0 resize-none leading-relaxed" placeholder="Tell your story..."></textarea>
</div>
</section>
<!-- Action Footer (Floating on Scroll Style) -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-[#181818]/90 backdrop-blur-md px-6 py-4 rounded-full border border-[#262626] shadow-[0_4px_40px_rgba(0,0,0,0.6)] z-40">
<button class="px-6 py-2 font-label-md text-neutral-400 hover:text-neutral-100 transition-colors">
                Cancel
            </button>
<div class="w-[1px] h-6 bg-[#262626]"></div>
<button class="px-6 py-2 font-label-md text-neutral-400 hover:text-neutral-100 transition-colors">
                Save Draft
            </button>
<button class="px-8 py-2 font-label-md bg-indigo-500 text-white rounded-full hover:bg-indigo-400 transition-all active:scale-95 shadow-[0_0_20px_rgba(99,102,241,0.2)]">
                Publish
            </button>
</div>
</main>
<!-- Footer -->
<footer class="bg-[#121212] full-width border-t border-[#262626] mt-24">
<div class="max-w-[720px] mx-auto py-12 px-6 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="font-['Inter'] text-xs text-neutral-500">© 2024 Quietude. Built for the focused mind.</div>
<div class="flex items-center gap-6">
<a class="font-['Inter'] text-xs text-neutral-500 hover:text-indigo-400 underline underline-offset-4 transition-colors" href="#">Privacy</a>
<a class="font-['Inter'] text-xs text-neutral-500 hover:text-indigo-400 underline underline-offset-4 transition-colors" href="#">Terms</a>
<a class="font-['Inter'] text-xs text-neutral-500 hover:text-indigo-400 underline underline-offset-4 transition-colors" href="#">RSS</a>
<a class="font-['Inter'] text-xs text-neutral-500 hover:text-indigo-400 underline underline-offset-4 transition-colors" href="#">Archive</a>
</div>
</div>
</footer>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full bg-[#181818]/90 backdrop-blur-md flex justify-around items-center h-16 pb-safe border-t border-[#262626] shadow-[0_-4px_20px_rgba(0,0,0,0.4)] z-50">
<a class="flex flex-col items-center justify-center text-neutral-500 hover:text-neutral-200" href="#">
<span class="material-symbols-outlined" data-icon="article">article</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Feed</span>
</a>
<a class="flex flex-col items-center justify-center text-indigo-400 font-bold scale-95 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Write</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 hover:text-neutral-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
</body></html>
