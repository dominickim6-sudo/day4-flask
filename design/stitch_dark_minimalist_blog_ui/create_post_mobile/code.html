<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed-variant": "#2f2ebe",
                    "surface-bright": "#393939",
                    "inverse-surface": "#e5e2e1",
                    "inverse-primary": "#494bd6",
                    "secondary-fixed": "#d4e4fa",
                    "surface-container-low": "#1c1b1b",
                    "primary-fixed": "#e1e0ff",
                    "on-tertiary-container": "#452000",
                    "tertiary-fixed-dim": "#ffb783",
                    "on-tertiary-fixed-variant": "#703700",
                    "on-surface": "#e5e2e1",
                    "error": "#ffb4ab",
                    "surface-dim": "#131313",
                    "on-primary-container": "#0d0096",
                    "error-container": "#93000a",
                    "on-secondary-container": "#a7b6cc",
                    "on-surface-variant": "#c7c4d7",
                    "surface-container-highest": "#353534",
                    "on-error": "#690005",
                    "primary-fixed-dim": "#c0c1ff",
                    "on-error-container": "#ffdad6",
                    "on-background": "#e5e2e1",
                    "on-tertiary-fixed": "#301400",
                    "outline": "#908fa0",
                    "secondary-container": "#39485a",
                    "on-primary-fixed": "#07006c",
                    "on-secondary-fixed": "#0d1c2d",
                    "surface-tint": "#c0c1ff",
                    "tertiary-fixed": "#ffdcc5",
                    "surface-container-lowest": "#0e0e0e",
                    "tertiary": "#ffb783",
                    "surface-variant": "#353534",
                    "secondary": "#b9c8de",
                    "on-secondary": "#233143",
                    "surface-container": "#201f1f",
                    "surface-container-high": "#2a2a2a",
                    "secondary-fixed-dim": "#b9c8de",
                    "background": "#131313",
                    "on-secondary-fixed-variant": "#39485a",
                    "primary-container": "#8083ff",
                    "primary": "#c0c1ff",
                    "inverse-on-surface": "#313030",
                    "on-primary": "#1000a9",
                    "outline-variant": "#464554",
                    "surface": "#131313",
                    "tertiary-container": "#d97721",
                    "on-tertiary": "#4f2500"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "24px",
                    "unit": "4px",
                    "stack-lg": "48px",
                    "content-width": "720px",
                    "stack-xl": "80px",
                    "margin-mobile": "16px",
                    "stack-sm": "12px",
                    "stack-md": "24px",
                    "container-max": "1120px"
            },
            "fontFamily": {
                    "display": ["Inter"],
                    "label-md": ["Inter"],
                    "h1": ["Inter"],
                    "body-lg": ["Inter"],
                    "h2": ["Inter"],
                    "caption": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],

                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]

          },
        },
      }

<style>
        body {
            background-color: #121212;
            color: #e5e2e1;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .focus-ring:focus {
            outline: none;
            border-bottom-color: #c0c1ff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-background selection:bg-primary-container selection:text-on-primary-container">
<header class="bg-[#121212] sticky top-0 z-50 border-b border-[#262626]">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-[1120px] mx-auto">
<span class="text-xl font-bold tracking-tighter text-neutral-100">Quietude</span>
<div class="flex items-center gap-4">
<button class="text-neutral-400 hover:text-neutral-100 transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</div>
</header>
<main class="max-w-[720px] mx-auto px-6 py-8 flex flex-col min-h-[calc(100vh-144px)]">
<div class="mb-10">
<input aria-label="Post Title" class="w-full bg-transparent border-none p-0 font-h1 text-h1 text-on-surface placeholder:text-neutral-600 focus:ring-0 focus:outline-none mb-4" placeholder="Post Title" type="text"/>
<div class="flex items-center gap-2 mb-8">
<div class="w-6 h-6 rounded-full bg-surface-container-highest overflow-hidden">
<img alt="Author profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional writer in soft studio lighting with a neutral gray background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8yMPM6OW7MfJWcL2aPQ5ffBtZMWQYHsUb_9DtX2N5RSbnybQff0NmB-aP273lYjxvjvh1B66Rr3Oc6nDxXMdWoNQFGczowoFSlqt3nr3Un7deamK0YclhaZnvqFtfwpTAhz6an7EZ_s7_dSI_scogg9g-NsgdFBCyifRtDu6eLVn90I9zaK4bcEU8tsPDQHPJcXytcnrmKuvbC5M-qIqBKdfAxUJAIW5aH_a9WjVtldmVtmOIFSHPTCx4WjjrJ-HMC7WqhQ0W8TMu"/>
</div>
<span class="font-label-md text-label-md text-neutral-500">Drafting as User</span>
<span class="text-neutral-700">•</span>
<span class="font-caption text-caption text-neutral-500">Reading time: 0 min</span>
</div>
</div>
<div class="relative flex-grow">
<textarea aria-label="Post content" class="w-full bg-transparent border-none p-0 font-body-lg text-body-lg text-neutral-300 placeholder:text-neutral-700 focus:ring-0 focus:outline-none min-h-[300px] resize-none" placeholder="Start writing your thoughts..."></textarea>
</div>
<div class="mt-8 flex flex-wrap gap-3 mb-16">
<button class="flex items-center gap-2 bg-[#181818] border border-[#262626] px-4 py-2 rounded-full font-label-md text-label-md text-neutral-400 hover:text-neutral-200 transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                Add Tags
            </button>
<button class="flex items-center gap-2 bg-[#181818] border border-[#262626] px-4 py-2 rounded-full font-label-md text-label-md text-neutral-400 hover:text-neutral-200 transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="image">image</span>
                Add Media
            </button>
</div>
<div class="fixed bottom-16 left-0 w-full px-6 py-4 bg-gradient-to-t from-[#121212] via-[#121212]/90 to-transparent z-40">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-xl shadow-lg active:scale-95 transition-transform duration-200">
                Publish Post
            </button>
</div>
</main>
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center h-16 pb-safe bg-[#181818]/90 backdrop-blur-md border-t border-[#262626] shadow-[0_-4px_20px_rgba(0,0,0,0.4)] z-50">
<a class="flex flex-col items-center justify-center text-neutral-500 hover:text-neutral-200 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="article">article</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Feed</span>
</a>
<a class="flex flex-col items-center justify-center text-indigo-400 font-bold" href="#">
<span class="material-symbols-outlined" data-icon="edit_note" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Write</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 hover:text-neutral-200 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
<div class="hidden md:block">
<footer class="max-w-[720px] mx-auto py-12 px-6 flex flex-col md:flex-row justify-between items-center gap-4 border-t border-[#262626] mt-24">
<p class="font-['Inter'] text-xs text-neutral-500">© 2024 Quietude. Built for the focused mind.</p>
<div class="flex gap-6">
<a class="font-['Inter'] text-xs text-neutral-500 hover:text-indigo-400 transition-colors" href="#">Privacy</a>
<a class="font-['Inter'] text-xs text-neutral-500 hover:text-indigo-400 transition-colors" href="#">Terms</a>
<a class="font-['Inter'] text-xs text-neutral-500 hover:text-indigo-400 transition-colors" href="#">RSS</a>
</div>
</footer>
</div>
</body></html>
