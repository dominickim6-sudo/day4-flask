services:
  - type: web
    name: day4-flask
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/board.db
    disk:
      name: day4-flask-data
      mountPath: /var/data
      sizeGB: 1
