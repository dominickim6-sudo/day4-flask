{% extends "base.html" %}

{% block title %}{{ post.title }} · 아직도 가야할 길{% endblock %}

{% block content %}
<section class="editor card">
  <p class="meta">{{ post.created_at }}</p>
  <h1>{{ post.title }}</h1>
  {% if post.image_url %}
    <img src="{{ post.image_url }}" alt="{{ post.title }}" class="post-image" loading="lazy">
  {% endif %}
  <p class="post-content">{{ post.content }}</p>

  <div class="post-actions">
    <a href="{{ url_for('edit_post', post_id=post.id) }}" class="btn btn-primary">수정</a>
    <form action="{{ url_for('delete_post', post_id=post.id) }}" method="post" onsubmit="return confirm('정말 삭제할까요?');">
      <button type="submit" class="btn btn-danger">삭제</button>
    </form>
  </div>
</section>
{% endblock %}
