<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Quietude Board{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="{{ url_for('list_posts') }}" class="brand">Quietude</a>
      <nav class="menu">
        <a href="{{ url_for('list_posts') }}">Feed</a>
        <a href="{{ url_for('new_post') }}">Writing</a>
      </nav>
      <a href="{{ url_for('new_post') }}" class="btn btn-primary">Write</a>
    </div>
  </header>

  <div class="progress-line"></div>

  <main class="container page">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
